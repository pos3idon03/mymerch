version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: always
    container_name: b2b-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: b2b-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      - mongo
    volumes:
      - ./uploads:/app/uploads

volumes:
  mongo-data: 